name: Backup Automático por Setor
on:
  workflow_dispatch: {}   # disparado pelo cron-job.org (ou manualmente pela aba "Actions")

# ⬇️ NOVO: nunca deixa dois backups rodarem ao mesmo tempo.
# Se um novo disparo chegar enquanto outro ainda roda, ele espera o anterior
# terminar (em vez de brigar pelo git push). cancel-in-progress:false garante
# que nenhum backup em andamento seja cancelado no meio.
concurrency:
  group: backup-automatico
  cancel-in-progress: false

permissions:
  contents: write
jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Baixa o repositório
        uses: actions/checkout@v4
      - name: Configura o Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Roda o backup
        env:
          FIREBASE_DB_URL: "https://comando-geral-98c87-default-rtdb.firebaseio.com"
          FIREBASE_BASE_PATH: "efetivo_novo"
        run: node .github/scripts/backup.mjs
      - name: Sobe os arquivos gerados (se houve algum backup novo)
        run: |
          git config user.name "backup-automatico[bot]"
          git config user.email "actions@github.com"
          git add backups/ || true
          if ! git diff --cached --quiet; then
            git commit -m "🗓 Backup automático $(date -u +'%Y-%m-%d %H:%M UTC')"
            # ⬇️ NOVO: se alguém commitou nesse meio-tempo, rebaseia antes de empurrar
            git pull --rebase --autostash origin "$(git rev-parse --abbrev-ref HEAD)" || true
            git push
          else
            echo "Nada novo pra commitar desta vez."
          fi
