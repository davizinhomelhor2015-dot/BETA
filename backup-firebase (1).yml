name: Backup Automático Firebase

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar repositório
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Fazer backup do Firebase
        run: |
          echo "Conectando ao Firebase..."

          curl -sf \
            "https://comando-geral-98c87-default-rtdb.firebaseio.com/efetivo_novo.json" \
            -o dados_brutos.json

          if [ ! -s dados_brutos.json ] || grep -q '"error"' dados_brutos.json; then
            echo "ERRO ao baixar dados."
            cat dados_brutos.json
            exit 1
          fi

          mkdir -p backups

          python3 -c "
          import json, datetime

          with open('dados_brutos.json', 'r', encoding='utf-8') as f:
              dados = json.load(f)

          agora = datetime.datetime.utcnow().strftime('%Y-%m-%dT%H:%M:%SZ')
          nome  = 'backups/backup_' + datetime.datetime.now().strftime('%Y-%m-%d_%Hh%M') + '.json'

          saida = {
              '_meta': {
                  'backup_em': agora,
                  'no_raiz': 'efetivo_novo',
                  'projeto': 'comando-geral-98c87',
                  'gerado_por': 'github-actions',
                  'unidades': ['BPM1','BPM2','BPM3','BPM4','DIP','SDR','CIT','COE','DTE','ROTA','PRF','BOPE']
              },
              'dados': dados
          }

          with open(nome, 'w', encoding='utf-8') as f:
              json.dump(saida, f, ensure_ascii=False, indent=2)

          print('Salvo em: ' + nome)
          "

          rm dados_brutos.json

          cd backups
          ls -t backup_*.json 2>/dev/null | tail -n +31 | xargs -r rm --
          echo "Total de backups mantidos: $(ls backup_*.json 2>/dev/null | wc -l)"

      - name: Salvar no repositório
        run: |
          git config user.name "Backup Automático"
          git config user.email "backup@github-actions"
          git add backups/
          git diff --cached --quiet || git commit -m "backup $(date +'%d/%m/%Y %H:%M')"
          git push
